	{% include page-header.html %}

    <!-- Embedded DSR form (your URL) -->
    <iframe
      id="dsr-dnss-iframe"
      title="Do Not Sell or Share Request"
      src="https://privacy-central.securiti.ai/dsr-universal-embed/7752fe31-301c-482f-bb85-f11bb69f183b"
    ></iframe>
    <script>
    window.addEventListener('message', (event) => {
        if (event.data.sec_signal_identifier === 'sec-dsr-submission-success') {
            // Process message
            if (window.SecuritiSDK && bannerGenerator && (event.data.sec_dsr_data.ticket_type||[]).includes('do-not-sell')) {
                bannerGenerator.setDoNotSellConsent()
            }
        }
    });
    </script>
