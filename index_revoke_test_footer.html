<!DOCTYPE html>
<html>
<head>
    <title>Securiti Compliance Test Site</title>
    <style>
        /* ── Footer bar ── */
        .site-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
            padding: 14px 30px;
            display: flex;
            gap: 40px;
            align-items: center;
            z-index: 99999;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
        }

        /* Shared link style for all footer items */
        .site-footer a,
        .site-footer .cmp-revoke-consent {
            color: #1a2a4a;
            text-decoration: none;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
        }

        .site-footer a:hover,
        .site-footer .cmp-revoke-consent:hover {
            text-decoration: underline;
        }

        /* Arrow icon after each link */
        .site-footer a::after,
        .site-footer .cmp-revoke-consent::after {
            content: ' ↗';
        }

        /* Reset the revoke button so it looks like a plain link */
        .cmp-revoke-consent {
            background: none !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
            font-size: 14px !important;
            font-family: inherit !important;
            color: #1a2a4a !important;
            cursor: pointer !important;
            text-decoration: none !important;
            /* REMOVE fixed positioning — it lives in the footer now */
            position: static !important;
            bottom: auto !important;
            left: auto !important;
            z-index: auto !important;
        }
    </style>
